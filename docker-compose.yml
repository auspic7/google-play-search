services:
  backend:
    build: ./backend
    container_name: gplay-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://backend:8000
    container_name: gplay-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
